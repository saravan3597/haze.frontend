<svg width="1200" height="628" viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Background dot grid -->
    <pattern id="bg-dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.1" fill="#111111" fill-opacity="0.055"/>
    </pattern>

    <!-- Panel gradients -->
    <linearGradient id="grad-midnight" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%"   stop-color="#0F0C29"/>
      <stop offset="50%"  stop-color="#302B63"/>
      <stop offset="100%" stop-color="#24243E"/>
    </linearGradient>
    <linearGradient id="grad-dusk" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#2D1B69"/>
      <stop offset="55%"  stop-color="#11998E"/>
      <stop offset="100%" stop-color="#38EF7D"/>
    </linearGradient>
    <linearGradient id="grad-arctic" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%"   stop-color="#C8E6FF"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>

    <!-- Dot pattern for the light panel -->
    <pattern id="panel-dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1.6" fill="#c0c0c0" fill-opacity="0.65"/>
    </pattern>

    <!-- Subtle right-side ambient tone -->
    <linearGradient id="bg-right-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f8f8f8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f0f2f5" stop-opacity="1"/>
    </linearGradient>

    <!-- Clip paths for panels (defined in local coords) -->
    <clipPath id="clip-p1"><rect width="148" height="262" rx="18"/></clipPath>
    <clipPath id="clip-p2"><rect width="148" height="262" rx="18"/></clipPath>
    <clipPath id="clip-p3"><rect width="148" height="262" rx="18"/></clipPath>

    <!-- Drop shadow filter -->
    <filter id="panel-shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <!-- Subtle glow filter for active panel -->
    <filter id="center-glow" x="-25%" y="-15%" width="150%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#302B63" flood-opacity="0.15"/>
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.15"/>
    </filter>

  </defs>

  <!-- ── Background ───────────────────────────────────────────────── -->
  <rect width="1200" height="628" fill="#ffffff"/>
  <rect width="1200" height="628" fill="url(#bg-dots)"/>
  <rect width="1200" height="628" fill="url(#bg-right-fade)"/>

  <!-- Subtle vertical separator -->
  <line x1="585" y1="48" x2="585" y2="580" stroke="#e8e8e8" stroke-width="1"/>


  <!-- ══════════════════════════════════════════════════════════════ -->
  <!--  LEFT — Brand + copy                                          -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <!-- H Logo mark  (56 × 56, black bg, white H, corner notches) -->
  <g transform="translate(72, 72)">
    <rect width="56" height="56" fill="#111111" rx="6"/>
    <!-- Left bar -->
    <rect x="11" y="11" width="10" height="34" fill="#ffffff"/>
    <!-- Right bar -->
    <rect x="35" y="11" width="10" height="34" fill="#ffffff"/>
    <!-- Crossbar -->
    <rect x="11" y="22" width="34" height="12" fill="#ffffff"/>
    <!-- Corner notches (cut the outer H corners) -->
    <rect x="11" y="11" width="4"  height="4"  fill="#111111"/>
    <rect x="41" y="11" width="4"  height="4"  fill="#111111"/>
    <rect x="11" y="41" width="4"  height="4"  fill="#111111"/>
    <rect x="41" y="41" width="4"  height="4"  fill="#111111"/>
  </g>

  <!-- HAZE wordmark -->
  <text
    x="72" y="246"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="112" font-weight="700" letter-spacing="-4"
    fill="#111111" opacity="0.92">HAZE</text>

  <!-- Tagline -->
  <text
    x="75" y="285"
    font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="17" font-weight="400" letter-spacing="0.3"
    fill="#999999">Wallpapers, generated by code.</text>

  <!-- Rule -->
  <line x1="72" y1="318" x2="510" y2="318" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Descriptor line 1 -->
  <text
    x="72" y="350"
    font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="13.5" font-weight="400" letter-spacing="0.2"
    fill="#b0b0b0">Date-seeded · Deterministic · Fully offline generation</text>

  <!-- Descriptor line 2 -->
  <text
    x="72" y="373"
    font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="13.5" font-weight="400" letter-spacing="0.2"
    fill="#b0b0b0">No images. No assets. Just code running on your device.</text>


  <!-- ── Tech badges ──────────────────────────────────────────────── -->

  <!-- JavaScript -->
  <g transform="translate(72, 406)">
    <rect width="116" height="32" rx="5" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
    <text x="12" y="21"
      font-family="'SF Mono', 'Fira Code', monospace"
      font-size="12.5" font-weight="600" fill="#854d0e">JavaScript</text>
  </g>

  <!-- Canvas API -->
  <g transform="translate(200, 406)">
    <rect width="112" height="32" rx="5" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1"/>
    <text x="12" y="21"
      font-family="'SF Mono', 'Fira Code', monospace"
      font-size="12.5" font-weight="600" fill="#0f766e">Canvas API</text>
  </g>

  <!-- mulberry32 -->
  <g transform="translate(324, 406)">
    <rect width="120" height="32" rx="5" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
    <text x="12" y="21"
      font-family="'SF Mono', 'Fira Code', monospace"
      font-size="12.5" font-weight="600" fill="#7e22ce">mulberry32</text>
  </g>

  <!-- Ionic -->
  <g transform="translate(72, 450)">
    <rect width="72" height="32" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="12" y="21"
      font-family="'SF Mono', 'Fira Code', monospace"
      font-size="12.5" font-weight="600" fill="#1d4ed8">Ionic</text>
  </g>

  <!-- Firebase -->
  <g transform="translate(156, 450)">
    <rect width="92" height="32" rx="5" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <text x="12" y="21"
      font-family="'SF Mono', 'Fira Code', monospace"
      font-size="12.5" font-weight="600" fill="#c2410c">Firebase</text>
  </g>

  <!-- Capacitor -->
  <g transform="translate(260, 450)">
    <rect width="102" height="32" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="12" y="21"
      font-family="'SF Mono', 'Fira Code', monospace"
      font-size="12.5" font-weight="600" fill="#1e40af">Capacitor</text>
  </g>

  <!-- Open source label -->
  <text
    x="72" y="556"
    font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="11" font-weight="500" letter-spacing="3"
    fill="#d0d0d0">OPEN SOURCE · iOS · ANDROID · WEB</text>


  <!-- ══════════════════════════════════════════════════════════════ -->
  <!--  RIGHT — Three wallpaper preview panels                       -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <!-- Panel 1 — Gradient "Midnight" (left, tilted) -->
  <g transform="translate(630, 108) rotate(-5, 74, 131)" filter="url(#panel-shadow)">
    <g clip-path="url(#clip-p1)">
      <rect width="148" height="262" fill="url(#grad-midnight)"/>
      <!-- Vignette overlay -->
      <rect width="148" height="262" fill="black" opacity="0.18"/>
    </g>
    <rect width="148" height="262" rx="18" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <!-- Label -->
    <text x="12" y="246"
      font-family="'SF Pro Text', Arial, sans-serif"
      font-size="8.5" font-weight="500" letter-spacing="2"
      fill="rgba(255,255,255,0.3)">GRADIENT</text>
  </g>

  <!-- Panel 2 — Color Blocks "Bauhaus" (center, upright, prominent) -->
  <g transform="translate(800, 80)" filter="url(#center-glow)">
    <g clip-path="url(#clip-p2)">
      <!-- Bauhaus: red top-left, blue top-right, cream bottom-left, navy bottom-right -->
      <rect x="0"   y="0"   width="80"  height="131" fill="#E63946"/>
      <rect x="80"  y="0"   width="68"  height="131" fill="#457B9D"/>
      <rect x="0"   y="131" width="100" height="131" fill="#F1FAEE"/>
      <rect x="100" y="131" width="48"  height="131" fill="#1D3557"/>
      <!-- Thin dividers -->
      <line x1="80"  y1="0"   x2="80"  y2="262" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="0"   y1="131" x2="148" y2="131" stroke="#ffffff" stroke-width="1.5"/>
    </g>
    <rect width="148" height="262" rx="18" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <!-- Label -->
    <text x="12" y="246"
      font-family="'SF Pro Text', Arial, sans-serif"
      font-size="8.5" font-weight="500" letter-spacing="2"
      fill="rgba(0,0,0,0.3)">COLOR BLOCKS</text>
  </g>

  <!-- Panel 3 — Dot Grid "Graph" (right, tilted) -->
  <g transform="translate(970, 108) rotate(5, 74, 131)" filter="url(#panel-shadow)">
    <g clip-path="url(#clip-p3)">
      <rect width="148" height="262" fill="#f5f5f0"/>
      <!-- Dot grid fill -->
      <rect width="148" height="262" fill="url(#panel-dots)"/>
      <!-- Accent dots -->
      <circle cx="44"  cy="44"  r="3.2" fill="#111111" fill-opacity="0.45"/>
      <circle cx="110" cy="88"  r="3.2" fill="#111111" fill-opacity="0.45"/>
      <circle cx="33"  cy="132" r="3.2" fill="#111111" fill-opacity="0.45"/>
      <circle cx="99"  cy="176" r="3.2" fill="#111111" fill-opacity="0.45"/>
      <circle cx="55"  cy="220" r="3.2" fill="#111111" fill-opacity="0.45"/>
      <circle cx="121" cy="44"  r="3.2" fill="#111111" fill-opacity="0.45"/>
    </g>
    <rect width="148" height="262" rx="18" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
    <!-- Label -->
    <text x="12" y="246"
      font-family="'SF Pro Text', Arial, sans-serif"
      font-size="8.5" font-weight="500" letter-spacing="2"
      fill="rgba(0,0,0,0.28)">DOT GRID</text>
  </g>

  <!-- Modes label strip under panels -->
  <text
    x="660" y="410"
    font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="10.5" font-weight="400" letter-spacing="1.5"
    fill="#bbbbbb" text-anchor="middle">GRADIENT</text>

  <text
    x="874" y="394"
    font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="10.5" font-weight="400" letter-spacing="1.5"
    fill="#bbbbbb" text-anchor="middle">COLOR BLOCKS</text>

  <text
    x="1045" y="410"
    font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="10.5" font-weight="400" letter-spacing="1.5"
    fill="#bbbbbb" text-anchor="middle">DOT GRID</text>

  <!-- Plus AI label -->
  <text
    x="874" y="430"
    font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="10.5" font-weight="400" letter-spacing="1.5"
    fill="#cccccc" text-anchor="middle">+ AI GENERATION</text>

</svg>
